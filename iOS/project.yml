name: Roadtoll
options:
  bundleIdPrefix: com.shimondeitel.roadtoll
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Roadtoll:
    type: application
    platform: iOS
    sources:
      - path: Roadtoll
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.roadtoll
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Roadtoll/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RoadtollTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RoadtollTests
      - path: Roadtoll.storekit
    dependencies:
      - target: Roadtoll
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.roadtoll.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RoadtollUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RoadtollUITests
    dependencies:
      - target: Roadtoll
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.roadtoll.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Roadtoll:
    build:
      targets:
        Roadtoll: all
        RoadtollTests: [test]
        RoadtollUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Roadtoll.storekit
    test:
      config: Debug
      storeKitConfiguration: Roadtoll.storekit
      targets:
        - RoadtollTests
        - RoadtollUITests
    archive:
      config: Release
